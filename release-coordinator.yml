# release-coordinator.yml
#
# Orchestrator CD pipeline. Store in the release-coordinator repo, alongside
# release-config.yml.
#
# Trigger: Manual only. Release coordinators should not auto-trigger a
# multi-component production deployment.
#
# Behavior:
#   1. Reads release-config.yml to determine which of the 3 components
#      (DataPlatform, AIML, WebApp) are in scope, and which branch/artifact
#      each one should deploy from.
#   2. Deploys them in a fixed order — DataPlatform, then AIML, then WebApp —
#      skipping any component that's disabled in the config.
#   3. Each stage is blocked if an upstream stage that was actually in scope
#      failed; skipped upstream stages do not block downstream ones.
#
# Fixes applied vs. the original sample:
#   - branchName in each DownloadPipelineArtifact@2 task is now driven by
#     release-config.yml (via stage output variables) instead of being
#     hardcoded to refs/heads/main for all three components.
#   - artifactName is likewise driven by release-config.yml instead of being
#     duplicated/hardcoded in the pipeline.
#   - The dataplatform-ci pipeline resource no longer uses a wildcard branch
#     (release/*), since resources.pipelines[].branch does not support
#     wildcards and was causing "Cannot determine pipeline run version" in
#     the Run Pipeline UI. It now has a fixed fallback branch; the real
#     per-release branch comes from release-config.yml.
#
# Before running: confirm the pipelineName values in release-config.yml match
# the source: values in resources.pipelines below — if your three component
# CI pipelines have different real names in your ADO project, update both
# files consistently.

trigger: none

parameters:
  - name: environment
    displayName: "Target Environment"
    type: string
    default: "staging"
    values:
      - staging
      - uat
      - production
  - name: dryRun
    displayName: "Dry Run (validate only, no actual deployment)"
    type: boolean
    default: false

# Declare the coordinator repo so we can read release-config.yml from it.
# All component CI pipelines are also declared as resources so their
# artifacts/pipelineIDs are accessible, and so ADO can authorize this
# pipeline to consume their runs.
resources:
  repositories:
    - repository: coordinator
      type: git
      name: DBG-ACN/release-coordinator
      ref: refs/heads/main

  pipelines:
    - pipeline: webapp-ci
      project: DBG-ACN
      source: "WebApp-CI"
      branch: develop
    - pipeline: dataplatform-ci
      project: DBG-ACN
      source: "DataPlatform-CI"
      branch: main            # Fallback/default only for resource resolution — cannot be a
                               # wildcard. The branch actually deployed is read from
                               # release-config.yml (dp_branch output variable below).
    - pipeline: aiml-ci
      project: DBG-ACN
      source: "AIML-CI"
      branch: main

pool:
  vmImage: "ubuntu-latest"

stages:
  # ───────────────────────────────────────────────────────────────────────
  # Stage 0: Read release-config.yml and output which components are
  # enabled, plus each component's branch and artifact name. All subsequent
  # stages depend on the output variables set here.
  # ───────────────────────────────────────────────────────────────────────
  - stage: ValidateConfig
    displayName: "Read Release Config"
    jobs:
      - job: ReadConfig
        steps:
          - checkout: coordinator
            path: coordinator
          - task: PowerShell@2
            displayName: "Parse release-config.yml and set component flags"
            inputs:
              targetType: inline
              script: |
                # Install powershell-yaml module if not present
                if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
                  Install-Module powershell-yaml -Force -Scope CurrentUser
                }
                Import-Module powershell-yaml

                $config = Get-Content "$(Pipeline.Workspace)/coordinator/release-config.yml" | ConvertFrom-Yaml
                $release = $config.release

                Write-Host "Release: $($release.name)"
                Write-Host "Target environment: ${{ parameters.environment }}"
                Write-Host ""

                $dp  = $config.components.dataplatform.enabled
                $ai  = $config.components.aiml.enabled
                $web = $config.components.webapp.enabled

                $dpBranch  = $config.components.dataplatform.branch
                $aiBranch  = $config.components.aiml.branch
                $webBranch = $config.components.webapp.branch

                $dpArtifact  = $config.components.dataplatform.artifactName
                $aiArtifact  = $config.components.aiml.artifactName
                $webArtifact = $config.components.webapp.artifactName

                # Output flags/values as pipeline variables for downstream stages
                Write-Host "##vso[task.setvariable variable=dp_enabled;isOutput=true]$dp"
                Write-Host "##vso[task.setvariable variable=ai_enabled;isOutput=true]$ai"
                Write-Host "##vso[task.setvariable variable=web_enabled;isOutput=true]$web"

                Write-Host "##vso[task.setvariable variable=dp_branch;isOutput=true]$dpBranch"
                Write-Host "##vso[task.setvariable variable=ai_branch;isOutput=true]$aiBranch"
                Write-Host "##vso[task.setvariable variable=web_branch;isOutput=true]$webBranch"

                Write-Host "##vso[task.setvariable variable=dp_artifact;isOutput=true]$dpArtifact"
                Write-Host "##vso[task.setvariable variable=ai_artifact;isOutput=true]$aiArtifact"
                Write-Host "##vso[task.setvariable variable=web_artifact;isOutput=true]$webArtifact"

                Write-Host "Components in scope:"
                if ($dp)  { Write-Host "  [1] DataPlatform  (branch: $dpBranch)" }
                if ($ai)  { Write-Host "  [2] AIML          (branch: $aiBranch, deploys after DataPlatform)" }
                if ($web) { Write-Host "  [3] WebApp        (branch: $webBranch, deploys last)" }
                if (-not $dp -and -not $ai -and -not $web) {
                  Write-Error "No components are enabled in release-config.yml. Nothing to deploy."
                  exit 1
                }
            name: configOutput

  # ───────────────────────────────────────────────────────────────────────
  # Stage 1: DataPlatform — schema changes, Fabric deployment.
  # Skipped automatically when dataplatform.enabled = false.
  # ───────────────────────────────────────────────────────────────────────
  - stage: DeployDataPlatform
    displayName: "Deploy DataPlatform"
    dependsOn: ValidateConfig
    condition: >
      eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.dp_enabled'], 'True')
    variables:
      dp_branch: $[ stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.dp_branch'] ]
      dp_artifact: $[ stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.dp_artifact'] ]
    jobs:
      - deployment: DataPlatformDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download DataPlatform artifact"
                  inputs:
                    buildType: specific
                    project: MyProject
                    definition: $(resources.pipeline.dataplatform-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: $(dp_branch)
                    artifactName: $(dp_artifact)
                    targetPath: $(Pipeline.Workspace)/dataplatform
                - task: AzureCLI@2
                  displayName: "Apply database schema and Fabric changes"
                  condition: ne('${{ parameters.dryRun }}', 'true')
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying DataPlatform to ${{ parameters.environment }}"
                      bash $(Pipeline.Workspace)/dataplatform/scripts/deploy.sh \
                        --env ${{ parameters.environment }}

  # ───────────────────────────────────────────────────────────────────────
  # Stage 2: AIML — ML pipeline deployment.
  # Skipped when aiml.enabled = false. If DataPlatform was in scope but
  # failed, this stage does not run. If DataPlatform was not in scope
  # (Skipped), this stage still runs when AIML is enabled.
  # ───────────────────────────────────────────────────────────────────────
  - stage: DeployAIML
    displayName: "Deploy AIML Pipeline"
    dependsOn:
      - ValidateConfig
      - DeployDataPlatform
    condition: >
      and(
        in(dependencies.DeployDataPlatform.result, 'Succeeded', 'Skipped'),
        eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.ai_enabled'], 'True')
      )
    variables:
      ai_branch: $[ stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.ai_branch'] ]
      ai_artifact: $[ stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.ai_artifact'] ]
    jobs:
      - deployment: AIMLDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download AIML artifact"
                  inputs:
                    buildType: specific
                    project: MyProject
                    definition: $(resources.pipeline.aiml-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: $(ai_branch)
                    artifactName: $(ai_artifact)
                    targetPath: $(Pipeline.Workspace)/aiml
                - task: AzureCLI@2
                  displayName: "Deploy AIML scoring pipeline"
                  condition: ne('${{ parameters.dryRun }}', 'true')
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying AIML to ${{ parameters.environment }}"
                      bash $(Pipeline.Workspace)/aiml/scripts/deploy.sh \
                        --env ${{ parameters.environment }}

  # ───────────────────────────────────────────────────────────────────────
  # Stage 3: WebApp — React frontend and Web APIs. Always the last
  # component deployed. Waits for both DataPlatform and AIML to complete
  # or be skipped before proceeding. If either failed (not skipped),
  # WebApp deployment is blocked.
  # ───────────────────────────────────────────────────────────────────────
  - stage: DeployWebApp
    displayName: "Deploy WebApp (React + API)"
    dependsOn:
      - ValidateConfig
      - DeployDataPlatform
      - DeployAIML
    condition: >
      and(
        in(dependencies.DeployDataPlatform.result, 'Succeeded', 'Skipped'),
        in(dependencies.DeployAIML.result, 'Succeeded', 'Skipped'),
        eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.web_enabled'], 'True')
      )
    variables:
      web_branch: $[ stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.web_branch'] ]
      web_artifact: $[ stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.web_artifact'] ]
    jobs:
      - deployment: WebAppDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download WebApp artifact"
                  inputs:
                    buildType: specific
                    project: MyProject
                    definition: $(resources.pipeline.webapp-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: $(web_branch)
                    artifactName: $(web_artifact)
                    targetPath: $(Pipeline.Workspace)/webapp
                - task: AzureCLI@2
                  displayName: "Deploy React app and API to Azure"
                  condition: ne('${{ parameters.dryRun }}', 'true')
                  inputs:
                    azureSubscription: "Azure-ServiceConnection"
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      echo "Deploying WebApp to ${{ parameters.environment }}"
                      az staticwebapp deploy \
                        --app-location "$(Pipeline.Workspace)/webapp/dist" \
                        --deployment-token $(AZURE_STATIC_WEB_APP_TOKEN)

# ─────────────────────────────────────────────────────────────────────────
# HOW TO USE THIS FOR EACH RELEASE
# ─────────────────────────────────────────────────────────────────────────
#
# Edit only release-config.yml between releases — no changes to this file
# should be required for a normal release.
#
# WebApp-only release:
#   dataplatform.enabled: false
#   aiml.enabled:         false
#   webapp.enabled:       true
#   Result: Stages 1 and 2 are skipped. Only Stage 3 runs.
#
# DataPlatform + WebApp release:
#   dataplatform.enabled: true
#   aiml.enabled:         false
#   webapp.enabled:       true
#   Result: Stage 1 runs first. Stage 2 is skipped. Stage 3 runs after
#   Stage 1 succeeds.
#
# All three components:
#   dataplatform.enabled: true
#   aiml.enabled:         true
#   webapp.enabled:       true
#   Result: Stages run in sequence 1 -> 2 -> 3. If Stage 1 fails, Stages 2
#   and 3 are blocked.
#
# AIML-only (configuration change, no DB dependency):
#   dataplatform.enabled: false
#   aiml.enabled:         true
#   webapp.enabled:       false
#   Result: Stage 1 is skipped. Stage 2 runs. Stage 3 is skipped.
#
# ─────────────────────────────────────────────────────────────────────────
# NOTES FOR THE DEVOPS ENGINEER IMPLEMENTING THIS
# ─────────────────────────────────────────────────────────────────────────
#
# 1. Each component CI pipeline (WebApp-CI, DataPlatform-CI, AIML-CI) must
#    publish its artifact using the 'publish' keyword or
#    PublishPipelineArtifact@1, with a name matching artifactName in
#    release-config.yml.
#
# 2. Replace "Azure-ServiceConnection" with the actual service connection
#    name configured in ADO Project Settings.
#
# 3. The 'environment' resources (staging, uat, production) must already
#    exist in ADO Environments before this pipeline runs. Configure
#    approval gates there if you want a human sign-off per environment.
#
# 4. The first time this pipeline runs, ADO will prompt for authorization
#    to consume each pipeline resource (webapp-ci, dataplatform-ci,
#    aiml-ci) — approve these on the pipeline's Runs page, or the
#    DownloadPipelineArtifact@2 steps will fail / show "Cannot determine
#    pipeline run version" in the Run Pipeline dialog.
#
# 5. branch values in release-config.yml must be exact refs (e.g.
#    refs/heads/main, refs/heads/release/1.0) — wildcards like
#    refs/heads/release/* are not supported by DownloadPipelineArtifact@2.
#
# 6. For dryRun, all AzureCLI deployment tasks are conditioned to skip when
#    dryRun is true, so a release manager can validate the plan (which
#    stages would run, which artifacts would be pulled) before committing
#    to an actual deployment.
