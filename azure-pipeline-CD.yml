# =====================================================================
# release-coordinator.yml — converted version
#
# Changes from the original guide:
# 1. All three components (DataPlatform, AIML, WebApp) now deploy via
#    AzureRmWebAppDeployment@4 (Azure App Service Linux package deploy)
#    instead of the original generic AzureCLI@2 / az staticwebapp calls.
#      - DataPlatform -> ORT-Environment
#      - AIML         -> DBG-Training
#      - WebApp       -> Staging101
# 2. Each deploy stage now has a "CheckChanges" step that inspects
#    whether the component's folder actually changed since the last
#    successful build. If not, it sets an output variable SkipStage,
#    and the actual deployment task is skipped -- even if the
#    component is "enabled" in release-config.yml.
#
# This means a component only deploys when BOTH are true:
#   - it's enabled in release-config.yml, AND
#   - its folder actually changed in this artifact
# =====================================================================

trigger: none

parameters:
  - name: environment
    displayName: "Target Environment"
    type: string
    default: "staging"
    values:
      - staging
      - uat
      - production

  - name: dryRun
    displayName: "Dry Run (validate only, no actual deployment)"
    type: boolean
    default: false

resources:
  repositories:
    - repository: coordinator
      type: git
      name: DBG-ACN/release-coordinator
      ref: refs/heads/main

  pipelines:
    - pipeline: webapp-ci
      project: DBG-ACN
      source: "WebApp-CI"
      branch: main

    - pipeline: dataplatform-ci
      project: DBG-ACN
      source: "DataPlatform-CI"
      branch: main

    - pipeline: aiml-ci
      project: DBG-ACN
      source: "AIML-CI"
      branch: main

pool:
  vmImage: "ubuntu-latest"

stages:

  # -------------------------------------------------------------
  # Stage 0: Read release-config.yml (unchanged from original)
  # -------------------------------------------------------------
  - stage: ValidateConfig
    displayName: "Read Release Config"
    jobs:
      - job: ReadConfig
        steps:
          - checkout: coordinator
            path: coordinator

          - task: PowerShell@2
            displayName: "Parse release-config.yml and set component flags"
            inputs:
              targetType: inline
              script: |
                if (-not (Get-Module -ListAvailable -Name powershell-yaml)) {
                  Install-Module powershell-yaml -Force -Scope CurrentUser
                }
                Import-Module powershell-yaml

                $config = Get-Content "$(Pipeline.Workspace)/coordinator/release-config.yml" | ConvertFrom-Yaml
                $release = $config.release

                Write-Host "Release: $($release.name)"
                Write-Host "Target environment: ${{ parameters.environment }}"

                $dp  = $config.components.dataplatform.enabled
                $ai  = $config.components.aiml.enabled
                $web = $config.components.webapp.enabled

                Write-Host "##vso[task.setvariable variable=dp_enabled;isOutput=true]$dp"
                Write-Host "##vso[task.setvariable variable=ai_enabled;isOutput=true]$ai"
                Write-Host "##vso[task.setvariable variable=web_enabled;isOutput=true]$web"

                if (-not $dp -and -not $ai -and -not $web) {
                  Write-Error "No components are enabled in release-config.yml. Nothing to deploy."
                  exit 1
                }
            name: configOutput

  # -------------------------------------------------------------
  # Stage 1: DataPlatform -> Azure Web App "ORT-Environment"
  # -------------------------------------------------------------
  - stage: DeployDataPlatform
    displayName: "Deploy DataPlatform"
    dependsOn: ValidateConfig
    condition: >
      eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.dp_enabled'], 'True')
    variables:
      ConnectedServiceName: '45138fee-3b39-4bda-bba3-d5461fad16ab'
      WebAppKind: 'webApp'
      WebAppName: 'ORT-Environment'
    jobs:
      - deployment: DataPlatformDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download DataPlatform artifact"
                  inputs:
                    buildType: specific
                    project: DBG-ACN
                    definition: $(resources.pipeline.dataplatform-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: refs/heads/main
                    artifactName: dataplatform-drop
                    targetPath: $(System.DefaultWorkingDirectory)/DataPlatform/drop

                - bash: |
                    echo "Checking for changes in DataPlatform since last successful build..."
                    LAST_SHA=$(cat $(System.DefaultWorkingDirectory)/DataPlatform/drop/last-successful-sha.txt 2>/dev/null || echo "")
                    CURRENT_SHA=$(Build.SourceVersion)

                    if [ -z "$LAST_SHA" ]; then
                      echo "No previous successful SHA found -- treating as changed."
                      SKIP="false"
                    else
                      CHANGED=$(git diff --name-only "$LAST_SHA" "$CURRENT_SHA" -- DataPlatform/ | wc -l)
                      if [ "$CHANGED" -eq 0 ]; then
                        echo "No changes detected under DataPlatform/ -- skipping deployment."
                        SKIP="true"
                      else
                        echo "$CHANGED file(s) changed under DataPlatform/ -- proceeding with deployment."
                        SKIP="false"
                      fi
                    fi
                    echo "##vso[task.setvariable variable=SkipStage;isOutput=true]$SKIP"
                  name: CheckChanges
                  displayName: 'Check for changes in DataPlatform'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy Azure App Service'
                  condition: >
                    and(
                      ne(variables['CheckChanges.SkipStage'], 'true'),
                      ne('${{ parameters.dryRun }}', 'true')
                    )
                  inputs:
                    azureSubscription: '$(ConnectedServiceName)'
                    appType: '$(WebAppKind)'
                    WebAppName: '$(WebAppName)'
                    packageForLinux: '$(System.DefaultWorkingDirectory)/DataPlatform/drop/s.zip'

  # -------------------------------------------------------------
  # Stage 2: AIML -> Azure Web App "DBG-Training"
  # -------------------------------------------------------------
  - stage: DeployAIML
    displayName: "Deploy AIML Pipeline"
    dependsOn:
      - ValidateConfig
      - DeployDataPlatform
    condition: >
      and(
        in(dependencies.DeployDataPlatform.result, 'Succeeded', 'Skipped'),
        eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.ai_enabled'], 'True')
      )
    variables:
      ConnectedServiceName: '45138fee-3b39-4bda-bba3-d5461fad16ab'
      WebAppKind: 'webApp'
      WebAppName: 'DBG-Training'
    jobs:
      - deployment: AIMLDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download AIML artifact"
                  inputs:
                    buildType: specific
                    project: DBG-ACN
                    definition: $(resources.pipeline.aiml-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: refs/heads/main
                    artifactName: aiml-drop
                    targetPath: $(System.DefaultWorkingDirectory)/AIML/drop

                - bash: |
                    echo "Checking for changes in AIML since last successful build..."
                    LAST_SHA=$(cat $(System.DefaultWorkingDirectory)/AIML/drop/last-successful-sha.txt 2>/dev/null || echo "")
                    CURRENT_SHA=$(Build.SourceVersion)

                    if [ -z "$LAST_SHA" ]; then
                      echo "No previous successful SHA found -- treating as changed."
                      SKIP="false"
                    else
                      CHANGED=$(git diff --name-only "$LAST_SHA" "$CURRENT_SHA" -- AIML/ | wc -l)
                      if [ "$CHANGED" -eq 0 ]; then
                        echo "No changes detected under AIML/ -- skipping deployment."
                        SKIP="true"
                      else
                        echo "$CHANGED file(s) changed under AIML/ -- proceeding with deployment."
                        SKIP="false"
                      fi
                    fi
                    echo "##vso[task.setvariable variable=SkipStage;isOutput=true]$SKIP"
                  name: CheckChanges
                  displayName: 'Check for changes in AIML'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy Azure App Service'
                  condition: >
                    and(
                      ne(variables['CheckChanges.SkipStage'], 'true'),
                      ne('${{ parameters.dryRun }}', 'true')
                    )
                  inputs:
                    azureSubscription: '$(ConnectedServiceName)'
                    appType: '$(WebAppKind)'
                    WebAppName: '$(WebAppName)'
                    packageForLinux: '$(System.DefaultWorkingDirectory)/AIML/drop/s.zip'

  # -------------------------------------------------------------
  # Stage 3: WebApp — unchanged from original guide (no new
  # variables/task were provided for this component)
  # -------------------------------------------------------------
  - stage: DeployWebApp
    displayName: "Deploy WebApp (React + API)"
    dependsOn:
      - ValidateConfig
      - DeployDataPlatform
      - DeployAIML
    condition: >
      and(
        in(dependencies.DeployDataPlatform.result, 'Succeeded', 'Skipped'),
        in(dependencies.DeployAIML.result, 'Succeeded', 'Skipped'),
        eq(stageDependencies.ValidateConfig.ReadConfig.outputs['configOutput.web_enabled'], 'True')
      )
    variables:
      ConnectedServiceName: '45138fee-3b39-4bda-bba3-d5461fad16ab'
      WebAppKind: 'webApp'
      WebAppName: 'Staging101'
    jobs:
      - deployment: WebAppDeploy
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: "Download WebApp artifact"
                  inputs:
                    buildType: specific
                    project: DBG-ACN
                    definition: $(resources.pipeline.webapp-ci.pipelineID)
                    buildVersionToDownload: latestFromBranch
                    branchName: refs/heads/main
                    artifactName: webapp-drop
                    targetPath: $(System.DefaultWorkingDirectory)/WebApp/drop

                - bash: |
                    echo "Checking for changes in WebApp since last successful build..."
                    LAST_SHA=$(cat $(System.DefaultWorkingDirectory)/WebApp/drop/last-successful-sha.txt 2>/dev/null || echo "")
                    CURRENT_SHA=$(Build.SourceVersion)

                    if [ -z "$LAST_SHA" ]; then
                      echo "No previous successful SHA found -- treating as changed."
                      SKIP="false"
                    else
                      CHANGED=$(git diff --name-only "$LAST_SHA" "$CURRENT_SHA" -- WebApp/ | wc -l)
                      if [ "$CHANGED" -eq 0 ]; then
                        echo "No changes detected under WebApp/ -- skipping deployment."
                        SKIP="true"
                      else
                        echo "$CHANGED file(s) changed under WebApp/ -- proceeding with deployment."
                        SKIP="false"
                      fi
                    fi
                    echo "##vso[task.setvariable variable=SkipStage;isOutput=true]$SKIP"
                  name: CheckChanges
                  displayName: 'Check for changes in WebApp'

                - task: AzureRmWebAppDeployment@4
                  displayName: 'Deploy Azure App Service'
                  condition: >
                    and(
                      ne(variables['CheckChanges.SkipStage'], 'true'),
                      ne('${{ parameters.dryRun }}', 'true')
                    )
                  inputs:
                    azureSubscription: '$(ConnectedServiceName)'
                    appType: '$(WebAppKind)'
                    WebAppName: '$(WebAppName)'
                    packageForLinux: '$(System.DefaultWorkingDirectory)/WebApp/drop/s.zip'
